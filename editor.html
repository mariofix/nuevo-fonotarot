<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <title>GrapesJS + Bootswatch</title>
        <link rel="stylesheet" href="https://unpkg.com/grapesjs/dist/css/grapes.min.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">

        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --ui-bg: #0a0a0f;
                --ui-surface: #111118;
                --ui-border: #1e1e2e;
                --ui-accent: #7c3aed;
                --ui-accent2: #a78bfa;
                --ui-text: #e2e8f0;
                --ui-muted: #64748b;
                --ui-panel-w: 260px;
                --ui-top-h: 52px;
            }

            body,
            html {
                height: 100%;
                background: var(--ui-bg);
                color: var(--ui-text);
                font-family: 'Syne', sans-serif;
                overflow: hidden;
            }

            /* ─── TOP BAR ─────────────────────────────────────── */
            #topbar {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                height: var(--ui-top-h);
                background: var(--ui-surface);
                border-bottom: 1px solid var(--ui-border);
                display: flex;
                align-items: center;
                padding: 0 16px;
                gap: 16px;
                z-index: 9999;
            }

            #topbar .logo {
                font-size: 13px;
                font-weight: 800;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: var(--ui-accent2);
                white-space: nowrap;
                margin-right: 8px;
            }

            #topbar .sep {
                width: 1px;
                height: 24px;
                background: var(--ui-border);
            }

            /* Theme picker */
            #theme-picker {
                display: flex;
                align-items: center;
                gap: 10px;
                flex: 1;
            }

            #theme-picker label {
                font-size: 11px;
                font-weight: 600;
                color: var(--ui-muted);
                text-transform: uppercase;
                letter-spacing: 0.08em;
                white-space: nowrap;
            }

            #theme-select {
                background: var(--ui-bg);
                border: 1px solid var(--ui-border);
                color: var(--ui-text);
                padding: 5px 10px;
                border-radius: 6px;
                font-family: 'JetBrains Mono', monospace;
                font-size: 12px;
                cursor: pointer;
                outline: none;
                transition: border-color 0.15s;
            }

            #theme-select:hover,
            #theme-select:focus {
                border-color: var(--ui-accent);
            }

            /* Swatch preview dot */
            #swatch-preview {
                width: 14px;
                height: 14px;
                border-radius: 50%;
                background: var(--ui-accent);
                flex-shrink: 0;
                transition: background 0.3s;
                border: 2px solid rgba(255, 255, 255, 0.1);
            }

            /* Action buttons */
            .tb-btn {
                background: transparent;
                border: 1px solid var(--ui-border);
                color: var(--ui-text);
                padding: 6px 14px;
                border-radius: 6px;
                font-family: 'Syne', sans-serif;
                font-size: 12px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.15s;
                white-space: nowrap;
            }

            .tb-btn:hover {
                border-color: var(--ui-accent2);
                color: var(--ui-accent2);
            }

            .tb-btn.accent {
                background: var(--ui-accent);
                border-color: var(--ui-accent);
                color: #fff;
            }

            .tb-btn.accent:hover {
                background: #6d28d9;
                border-color: #6d28d9;
            }

            /* ─── EDITOR WRAPPER ──────────────────────────────── */
            #gjs-wrapper {
                position: fixed;
                top: var(--ui-top-h);
                left: 0;
                right: 0;
                bottom: 0;
            }

            #gjs {
                height: 100%;
            }

            /* ─── GRAPESJS OVERRIDES ──────────────────────────── */
            .gjs-pn-panels {
                background: var(--ui-surface) !important;
            }

            .gjs-pn-panel {
                background: var(--ui-surface) !important;
                border-color: var(--ui-border) !important;
            }

            .gjs-pn-btn {
                color: var(--ui-muted) !important;
                transition: color 0.15s !important;
            }

            .gjs-pn-btn:hover,
            .gjs-pn-btn.gjs-pn-active {
                color: var(--ui-accent2) !important;
            }

            .gjs-block-categories,
            .gjs-block-category {
                background: var(--ui-surface) !important;
            }

            .gjs-block-category__label {
                color: var(--ui-muted) !important;
                font-size: 10px !important;
                letter-spacing: 0.1em !important;
                text-transform: uppercase !important;
            }

            .gjs-block {
                background: var(--ui-bg) !important;
                border-color: var(--ui-border) !important;
                color: var(--ui-text) !important;
                border-radius: 6px !important;
                transition: border-color 0.15s !important;
            }

            .gjs-block:hover {
                border-color: var(--ui-accent) !important;
            }

            .gjs-block__label {
                color: var(--ui-text) !important;
                font-size: 10px !important;
            }

            .gjs-sm-sector {
                background: var(--ui-bg) !important;
                border-color: var(--ui-border) !important;
            }

            .gjs-sm-sector-title {
                background: var(--ui-surface) !important;
                color: var(--ui-text) !important;
                border-color: var(--ui-border) !important;
                font-size: 11px !important;
            }

            .gjs-field {
                background: var(--ui-bg) !important;
                color: var(--ui-text) !important;
                border-color: var(--ui-border) !important;
            }

            .gjs-field input,
            .gjs-field select {
                color: var(--ui-text) !important;
                background: transparent !important;
            }

            .gjs-layer {
                background: var(--ui-surface) !important;
                border-color: var(--ui-border) !important;
                color: var(--ui-text) !important;
            }

            .gjs-layer.gjs-selected {
                background: var(--ui-bg) !important;
            }

            .gjs-layer__name {
                color: var(--ui-text) !important;
            }

            .gjs-cv-canvas {
                background: #1a1a2e !important;
            }

            .gjs-toolbar {
                background: var(--ui-accent) !important;
                border-radius: 4px !important;
            }

            .gjs-toolbar-item {
                color: #fff !important;
            }

            .gjs-resizer-h {
                border-color: var(--ui-accent) !important;
            }

            .gjs-selected {
                outline-color: var(--ui-accent) !important;
            }

            /* Traits panel */
            .gjs-trt-trait__wrp {
                background: var(--ui-bg) !important;
            }

            .gjs-trt-trait {
                border-color: var(--ui-border) !important;
            }

            .gjs-label-wrp {
                color: var(--ui-muted) !important;
                font-size: 11px !important;
            }

            /* ─── EXPORT MODAL ────────────────────────────────── */
            #export-modal {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.8);
                backdrop-filter: blur(4px);
                z-index: 99999;
                align-items: center;
                justify-content: center;
            }

            #export-modal.open {
                display: flex;
            }

            .modal-box {
                background: var(--ui-surface);
                border: 1px solid var(--ui-border);
                border-radius: 12px;
                width: 90%;
                max-width: 760px;
                max-height: 80vh;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            .modal-header {
                padding: 16px 20px;
                border-bottom: 1px solid var(--ui-border);
                display: flex;
                align-items: center;
                justify-content: space-between;
            }

            .modal-header h3 {
                font-size: 14px;
                font-weight: 700;
                color: var(--ui-accent2);
            }

            .modal-meta {
                font-family: 'JetBrains Mono', monospace;
                font-size: 11px;
                color: var(--ui-muted);
                padding: 8px 20px;
                border-bottom: 1px solid var(--ui-border);
                background: var(--ui-bg);
            }

            .modal-meta span {
                color: var(--ui-accent2);
            }

            .modal-body {
                flex: 1;
                overflow: auto;
                padding: 16px 20px;
            }

            .modal-body pre {
                font-family: 'JetBrains Mono', monospace;
                font-size: 11px;
                line-height: 1.7;
                color: #a5f3fc;
                white-space: pre-wrap;
                word-break: break-all;
            }

            .modal-footer {
                padding: 12px 20px;
                border-top: 1px solid var(--ui-border);
                display: flex;
                gap: 10px;
                justify-content: flex-end;
            }

            .close-btn {
                background: none;
                border: none;
                color: var(--ui-muted);
                font-size: 18px;
                cursor: pointer;
                line-height: 1;
                padding: 2px 6px;
            }

            .close-btn:hover {
                color: var(--ui-text);
            }
        </style>
    </head>

    <body>

        <!-- TOP BAR -->
        <div id="topbar">
            <div class="logo">⬡ GrapesJS</div>
            <div class="sep"></div>

            <div id="theme-picker">
                <label>Bootswatch</label>
                <div id="swatch-preview"></div>
                <select id="theme-select">
                    <option value="default">Bootstrap (Default)</option>
                    <optgroup label="── Dark ──">
                        <option value="cyborg">Cyborg</option>
                        <option value="darkly">Darkly</option>
                        <option value="slate">Slate</option>
                        <option value="solar">Solar</option>
                        <option value="superhero">Superhero</option>
                        <option value="vapor">Vapor</option>
                    </optgroup>
                    <optgroup label="── Light ──">
                        <option value="cerulean">Cerulean</option>
                        <option value="cosmo">Cosmo</option>
                        <option value="flatly">Flatly</option>
                        <option value="journal">Journal</option>
                        <option value="litera">Litera</option>
                        <option value="lumen">Lumen</option>
                        <option value="lux">Lux</option>
                        <option value="materia">Materia</option>
                        <option value="minty">Minty</option>
                        <option value="morph">Morph</option>
                        <option value="pulse">Pulse</option>
                        <option value="quartz">Quartz</option>
                        <option value="sandstone">Sandstone</option>
                        <option value="simplex">Simplex</option>
                        <option value="sketchy">Sketchy</option>
                        <option value="spacelab">Spacelab</option>
                        <option value="united">United</option>
                        <option value="yeti">Yeti</option>
                        <option value="zephyr">Zephyr</option>
                    </optgroup>
                </select>
            </div>

            <div class="sep"></div>
            <button class="tb-btn" onclick="previewPage()">Preview</button>
            <button class="tb-btn accent" onclick="exportPage()">Export HTML</button>
        </div>

        <!-- EDITOR -->
        <div id="gjs-wrapper">
            <div id="gjs"></div>
        </div>

        <!-- EXPORT MODAL -->
        <div id="export-modal">
            <div class="modal-box">
                <div class="modal-header">
                    <h3>Exported HTML</h3>
                    <button class="close-btn" onclick="closeModal()">✕</button>
                </div>
                <div class="modal-meta">
                    Theme: <span id="modal-theme-name">default</span> &nbsp;|&nbsp;
                    Bootstrap CDN baked in &nbsp;|&nbsp;
                    Ready to deploy
                </div>
                <div class="modal-body">
                    <pre id="export-output"></pre>
                </div>
                <div class="modal-footer">
                    <button class="tb-btn" onclick="copyExport()">Copy to Clipboard</button>
                    <button class="tb-btn accent" onclick="downloadExport()">Download .html</button>
                </div>
            </div>
        </div>

        <!-- SCRIPTS -->
        <script src="https://unpkg.com/grapesjs"></script>
        <script src="https://unpkg.com/grapesjs-preset-webpage"></script>
        <script src="https://unpkg.com/grapesjs-blocks-basic"></script>

        <script>
            // ─── THEME CONFIG ──────────────────────────────────────────────
            const BOOTSWATCH_VERSION = '5.3.2';
            const BS_VERSION = '5.3.0';

            const SWATCH_COLORS = {
                default: '#0d6efd',
                cyborg: '#2a9fd6',
                darkly: '#375a7f',
                slate: '#3a3f44',
                solar: '#b58900',
                superhero: '#df6919',
                vapor: '#6f42c1',
                cerulean: '#2fa4e7',
                cosmo: '#2780e3',
                flatly: '#18bc9c',
                journal: '#eb6864',
                litera: '#4582ec',
                lumen: '#158cba',
                lux: '#1a1a1a',
                materia: '#2196F3',
                minty: '#78c2ad',
                morph: '#378dfc',
                pulse: '#593196',
                quartz: '#6610f2',
                sandstone: '#325d88',
                simplex: '#d9230f',
                sketchy: '#333333',
                spacelab: '#446e9b',
                united: '#e95420',
                yeti: '#008cba',
                zephyr: '#3459e6',
            };

            function getThemeUrl(theme) {
                if (theme === 'default') {
                    return `https://cdn.jsdelivr.net/npm/bootstrap@${BS_VERSION}/dist/css/bootstrap.min.css`;
                }
                return `https://cdn.jsdelivr.net/npm/bootswatch@${BOOTSWATCH_VERSION}/dist/${theme}/bootstrap.min.css`;
            }

            // ─── STATE ─────────────────────────────────────────────────────
            let currentTheme = 'default';
            let exportedHtml = '';

            // ─── EDITOR INIT ───────────────────────────────────────────────
            const editor = grapesjs.init({
                container: '#gjs',
                height: '100%',
                width: 'auto',
                storageManager: false,
                canvas: {
                    styles: [getThemeUrl('default')],
                    scripts: [
                        `https://cdn.jsdelivr.net/npm/bootstrap@${BS_VERSION}/dist/js/bootstrap.bundle.min.js`
                    ]
                },
                plugins: ['gjs-preset-webpage', 'gjs-blocks-basic'],
                pluginsOpts: {
                    'gjs-preset-webpage': {},
                    'gjs-blocks-basic': {}
                }
            });

            // ═══════════════════════════════════════════════════════════════
            // 15 EXTRA GRAPESJS BOOTSTRAP 5 BLOCKS
            // Paste this after your editor is initialized (after grapesjs.init)
            // ═══════════════════════════════════════════════════════════════

            const bm = editor.BlockManager;

            function addBlock(id, label, category, content, icon) {
                bm.add(id, {
                    label, category, content,
                    media: `<div style="font-size:22px;text-align:center;padding:4px">${icon}</div>`
                });
            }

<section class="container my-5">
  <div class="text-center mb-4">
    <h2 class="fw-bold">Choose Your Plan</h2>
    <div class="d-flex align-items-center justify-content-center gap-3 mt-3">
      <span class="fw-bold">Monthly</span>

            // ─── THEME SWITCHER ────────────────────────────────────────────
            function applyTheme(theme) {
                const canvasDoc = editor.Canvas.getDocument();
                const existing = canvasDoc.querySelector('#bootswatch-css');
                if (existing) existing.remove();

                const link = canvasDoc.createElement('link');
                link.id = 'bootswatch-css';
                link.rel = 'stylesheet';
                link.href = getThemeUrl(theme);
                canvasDoc.head.appendChild(link);

                currentTheme = theme;

                // Update swatch dot color
                document.getElementById('swatch-preview').style.background =
                    SWATCH_COLORS[theme] || '#0d6efd';
            }

            document.getElementById('theme-select').addEventListener('change', e => {
                applyTheme(e.target.value);
            });

            // Set initial dot color
            document.getElementById('swatch-preview').style.background = SWATCH_COLORS['default'];

            // ─── BUILD FULL PAGE OUTPUT ────────────────────────────────────
            function buildFullPage() {
                const html = editor.getHtml();
                const css = editor.getCss();
                const themeUrl = getThemeUrl(currentTheme);
                const themeName = currentTheme.charAt(0).toUpperCase() + currentTheme.slice(1);

                return `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Page</title>
  <!-- Bootswatch: ${themeName} -->
  <link rel="stylesheet" href="${themeUrl}">
  <style>
${css}
  </style>
</head>
<body>
${html}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@${BS_VERSION}/dist/js/bootstrap.bundle.min.js"><\/script>
</body>
</html>`;
            }

            // ─── EXPORT ────────────────────────────────────────────────────
            function exportPage() {
                exportedHtml = buildFullPage();
                const themeName = currentTheme.charAt(0).toUpperCase() + currentTheme.slice(1);
                document.getElementById('modal-theme-name').textContent = themeName;
                document.getElementById('export-output').textContent = exportedHtml;
                document.getElementById('export-modal').classList.add('open');
            }

            function closeModal() {
                document.getElementById('export-modal').classList.remove('open');
            }

            function copyExport() {
                navigator.clipboard.writeText(exportedHtml).then(() => {
                    const btn = event.target;
                    btn.textContent = 'Copied!';
                    setTimeout(() => btn.textContent = 'Copy to Clipboard', 2000);
                });
            }

            function downloadExport() {
                const blob = new Blob([exportedHtml], { type: 'text/html' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `page-${currentTheme}.html`;
                a.click();
                URL.revokeObjectURL(a.href);
            }

            // ─── PREVIEW ───────────────────────────────────────────────────
            function previewPage() {
                const html = buildFullPage();
                const blob = new Blob([html], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                window.open(url, '_blank');
                setTimeout(() => URL.revokeObjectURL(url), 10000);
            }

            // Close modal on backdrop click
            document.getElementById('export-modal').addEventListener('click', e => {
                if (e.target === e.currentTarget) closeModal();
            });
        </script>

    </body>

</html>
